name: dark_downloader
description: "دارك — Dark: cross-platform media downloader (Flutter + Rust)."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.1.10+22

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Supabase — Auth, Database, Edge Functions, Storage
  supabase_flutter: ^2.12.4

  # State Management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1

  # Localization (Arabic & English)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  speech_to_text: ^7.0.0

  # File & Path Management
  path_provider: ^2.1.5

  # Networking
  dio: ^5.3.0

  # Utility
  uuid: ^4.0.0
  freezed_annotation: ^3.1.0


  archive: ^4.0.2
  crypto: ^3.0.6

  # Open downloaded files
  open_file: ^4.0.0

  # URL Launcher
  url_launcher: ^6.1.0
  share_plus: any

  # Shared Preferences
  shared_preferences: ^2.2.0

  # Auth & Identity
  flutter_secure_storage: ^10.2.0


  # Video Player Engine (Native High Performance)
  media_kit: ^1.1.10
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7


  flutter_rust_bridge: 2.12.0
  rust_lib_dark_downloader:
    path: rust_builder

  # Permissions (storage, notifications, media) — mobile only
  # نستخدم أحدث نسخة تدعم Windows بدون coroutines deprecated
  permission_handler: ^12.0.1

  # Background download support
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0

  # Storage path helpers
  path: ^1.9.1

  # Connectivity check
  connectivity_plus: any
  device_info_plus: any
  package_info_plus: any
  app_links: any
  receive_sharing_intent: any
  flutter_overlay_window: any
  file_picker: ^12.0.0-beta.7
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  http: ^1.6.0
  sentry_flutter: ^8.14.2
  local_notifier: ^0.1.6
  window_manager: ^0.5.1
  tray_manager: ^0.5.3
  ffmpeg_kit_flutter_new_min_gpl: ^2.1.1
  webview_flutter: ^4.10.0
  webview_windows: ^0.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  freezed: ^3.2.5
  msix: ^3.16.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/bootstrap/desktop_tools_manifest.json
    - assets/bundled_ffmpeg/
    - assets/bundled_ffmpeg/windows/
    - assets/bundled_ffmpeg/linux/
    - assets/branding/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/icon.png"
  windows:
    generate: true
    image_path: "assets/branding/icon.png"
    icon_size: 256

flutter_native_splash:
  color: "#000000"
  image: "assets/branding/logo_512.png"
  android_12:
    image: "assets/branding/logo_512.png"
    color: "#000000"

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

msix_config:
  display_name: Dark Downloader
  publisher_display_name: Dark Technology
  publisher: CN=DarkTechnology, O=Dark, L=Baghdad, C=IQ
  identity_name: com.dark.downloader
  msix_version: 1.1.10.0
  logo_path: assets/branding/icon.png
  execution_alias: dark
  install_certificate: false
  store: false
  capabilities: internetClient, location, microphone, privateNetworkClientServer


