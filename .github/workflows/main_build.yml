name: MainBuild

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            flutter_cmd: build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
          - os: ubuntu-latest
            target: linux
            flutter_cmd: build linux --release --obfuscate --split-debug-info=build/app/outputs/symbols
          - os: windows-latest
            target: windows
            flutter_cmd: build windows --release --obfuscate --split-debug-info=build/app/outputs/symbols
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev libsecret-1-dev libjsoncpp-dev libnotify-dev libmpv-dev mpv libcurl4-openssl-dev zlib1g-dev
      - name: Pub get
        run: flutter pub get
      - name: Fetch FFmpeg
        if: matrix.target == 'android'
        run: pwsh ./scripts/fetch_ffmpeg_kit_android_maven_repo.ps1
        shell: pwsh
      - name: Setup Android Signing
        if: matrix.target == 'android'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES_CONTENT: ${{ secrets.KEY_PROPERTIES_CONTENT }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "$KEY_PROPERTIES_CONTENT" > android/key.properties
        shell: bash
      - name: Build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter ${{ matrix.flutter_cmd }} \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        shell: bash
      - name: Package Windows
        if: matrix.target == 'windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          flutter pub run msix:create --version "${version}.0"
          Move-Item -Path "build\windows\x64\runner\Release\dark_downloader.msix" -Destination "Dark-Downloader-v${version}-windows-x64.msix"
        shell: pwsh
      - name: Package Android
        if: matrix.target == 'android'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/app/outputs/flutter-apk/app-release.apk "Dark-Downloader-v${VERSION}-android-universal.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: |
            Dark-Downloader-v*.apk
            Dark-Downloader-v*.msix
            build/linux/x64/release/bundle/
          retention-days: 1
