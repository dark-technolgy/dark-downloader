name: MainBuild

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            flutter_cmd: build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
          - os: ubuntu-latest
            target: linux
            flutter_cmd: build linux --release --obfuscate --split-debug-info=build/app/outputs/symbols
          - os: windows-latest
            target: windows
            flutter_cmd: build windows --release --obfuscate --split-debug-info=build/app/outputs/symbols
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev libsecret-1-dev libjsoncpp-dev libnotify-dev libmpv-dev mpv libcurl4-openssl-dev zlib1g-dev
      - name: Pub get
        run: flutter pub get
      - name: Fetch FFmpeg
        if: matrix.target == 'android'
        run: pwsh ./scripts/fetch_ffmpeg_kit_android_maven_repo.ps1
        shell: pwsh
      - name: Setup Android Signing
        if: matrix.target == 'android'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES_CONTENT: ${{ secrets.KEY_PROPERTIES_CONTENT }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "$KEY_PROPERTIES_CONTENT" > android/key.properties
        shell: bash
      - name: Build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter ${{ matrix.flutter_cmd }} \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        shell: bash
      - name: Package Windows
        if: matrix.target == 'windows'
        run: |
          # Chocolatey is preinstalled on windows-latest; use it to install
          # Inno Setup 6 non-interactively (winget is not reliable in CI).
          choco install innosetup -y --no-progress
          $version = "${{ github.ref_name }}".TrimStart("v")
          pwsh ./scripts/build_installer.ps1 -SkipFlutterBuild -Version $version
          $setup = Get-ChildItem -Path "build\windows\x64\runner\Release" -Filter "Dark-Downloader-Setup-v$version.exe" | Select-Object -First 1
          Move-Item -Path $setup.FullName -Destination "Dark-Downloader-Setup-v${version}.exe"
        shell: pwsh
      - name: Package Linux
        if: matrix.target == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/linux/x64/release/bundle
          tar -czvf "../../../../../Dark-Downloader-v${VERSION}-linux-x64.tar.gz" .
      - name: Package Android
        if: matrix.target == 'android'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/app/outputs/flutter-apk/app-release.apk "Dark-Downloader-v${VERSION}-android-universal.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: |
            Dark-Downloader-v*.apk
            Dark-Downloader-Setup-v*.exe
            Dark-Downloader-v*.tar.gz
          retention-days: 1

  release:
    name: Release and Deploy
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Setup AWS CLI (for R2)
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto
      - name: Upload to R2
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          
          # Android
          aws s3 cp "artifacts/android-artifact/Dark-Downloader-v${VERSION}-android-universal.apk" \
            "s3://$BUCKET/releases/v$VERSION/Dark-Downloader-v$VERSION-android-universal.apk" \
            --endpoint-url "$ENDPOINT"
            
          # Windows
          aws s3 cp "artifacts/windows-artifact/Dark-Downloader-Setup-v${VERSION}.exe" \
            "s3://$BUCKET/releases/v$VERSION/Dark-Downloader-Setup-v$VERSION.exe" \
            --endpoint-url "$ENDPOINT"
            
          # Linux
          aws s3 cp "artifacts/linux-artifact/Dark-Downloader-v${VERSION}-linux-x64.tar.gz" \
            "s3://$BUCKET/releases/v$VERSION/Dark-Downloader-v$VERSION-linux-x64.tar.gz" \
            --endpoint-url "$ENDPOINT"
            
      - name: Update latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="${{ secrets.R2_PUBLIC_BASE_URL }}"
          
          # Get sizes
          AND_SIZE=$(stat -c%s "artifacts/android-artifact/Dark-Downloader-v${VERSION}-android-universal.apk")
          WIN_SIZE=$(stat -c%s "artifacts/windows-artifact/Dark-Downloader-Setup-v${VERSION}.exe")
          LIN_SIZE=$(stat -c%s "artifacts/linux-artifact/Dark-Downloader-v${VERSION}-linux-x64.tar.gz")
          
          cat <<EOF > latest.json
          {
            "version": "v$VERSION",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "html_url": "${{ secrets.APP_URL }}/#apps",
            "notes": "إصدار v$VERSION: مثبّت ويندوز رسمي مع اختصار سطح المكتب — بدون شهادة.",
            "assets": [
              {
                "name": "Dark-Downloader-v$VERSION-android-universal.apk",
                "platform": "android",
                "size": $AND_SIZE,
                "url": "$BASE_URL/releases/v$VERSION/Dark-Downloader-v$VERSION-android-universal.apk"
              },
              {
                "name": "Dark-Downloader-Setup-v$VERSION.exe",
                "platform": "windows",
                "size": $WIN_SIZE,
                "url": "$BASE_URL/releases/v$VERSION/Dark-Downloader-Setup-v$VERSION.exe"
              },
              {
                "name": "Dark-Downloader-v$VERSION-linux-x64.tar.gz",
                "platform": "linux",
                "size": $LIN_SIZE,
                "url": "$BASE_URL/releases/v$VERSION/Dark-Downloader-v$VERSION-linux-x64.tar.gz"
              }
            ]
          }
          EOF
          
          aws s3 cp latest.json "s3://${{ secrets.R2_BUCKET_NAME }}/latest.json" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

      - name: Update Supabase remote_config
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DOWNLOAD_URL="${{ secrets.R2_PUBLIC_BASE_URL }}/releases/v$VERSION/Dark-Downloader-v$VERSION-android-universal.apk"
          
          curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/remote_config?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{ \"latest_version\": \"v$VERSION\", \"download_url\": \"$DOWNLOAD_URL\" }"

      - name: Trigger Website Redeploy
        env:
          WEBSITE_PAT: ${{ secrets.WEBSITE_PAT }}
        run: |
          if [ -z "$WEBSITE_PAT" ]; then
            echo "WEBSITE_PAT is not set. Skipping website redeploy trigger."
          else
            echo "Triggering keenx-website redeployment via repository_dispatch..."
            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $WEBSITE_PAT" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/dark-technolgy/keenx-website/dispatches \
              -d '{"event_type": "deploy_website"}'
          fi
