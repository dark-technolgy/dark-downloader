name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  build-release:
    name: Build release for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android-apk
            flutter_cmd: build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
          - os: ubuntu-latest
            target: linux
            flutter_cmd: build linux --release --obfuscate --split-debug-info=build/app/outputs/symbols
          - os: windows-latest
            target: windows
            flutter_cmd: build windows --release --obfuscate --split-debug-info=build/app/outputs/symbols
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.target == 'android-apk'
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev libsecret-1-dev libjsoncpp-dev libnotify-dev libmpv-dev mpv libcurl4-openssl-dev zlib1g-dev

      - name: Pub get
        run: flutter pub get

      - name: Fetch FFmpeg Kit for Android
        if: matrix.target == 'android-apk'
        run: pwsh ./scripts/fetch_ffmpeg_kit_android_maven_repo.ps1
        shell: pwsh

      - name: Decode Android Keystore
        if: matrix.target == 'android-apk'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES_CONTENT: ${{ secrets.KEY_PROPERTIES_CONTENT }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "$KEY_PROPERTIES_CONTENT" > android/key.properties
        shell: bash

      - name: Build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter ${{ matrix.flutter_cmd }} \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        shell: bash

      - name: Package Windows
        if: matrix.target == 'windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          flutter pub run msix:create --version "${version}.0"
          Move-Item -Path "build\windows\x64\runner\Release\dark_downloader.msix" -Destination "Dark-Downloader-v${version}-windows-x64.msix"
        shell: pwsh

      - name: Package Linux
        if: matrix.target == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/linux/x64/release
          tar -czf "../../../../Dark-Downloader-v${VERSION}-linux-x64.tar.gz" bundle/

      - name: Package Android
        if: matrix.target == 'android-apk'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/app/outputs/flutter-apk/app-release.apk "Dark-Downloader-v${VERSION}-android-universal.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: dark-downloader-${{ matrix.target }}
          path: |
            Dark-Downloader-*.msix
            Dark-Downloader-*.tar.gz
            Dark-Downloader-v*-android-*.apk
          retention-days: 1

  upload-r2:
    name: Upload to Cloudflare R2
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Sync R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          aws s3 sync artifacts/ s3://${R2_BUCKET_NAME}/releases/v${VERSION}/ --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com --region auto

      - name: Manifest
        env:
          R2_PUBLIC_BASE_URL: https://releases.keenx.net
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="${R2_PUBLIC_BASE_URL%/}/releases/v${VERSION}"
          assets_json=""
          for f in $(find artifacts -type f \( -name '*.msix' -o -name '*.tar.gz' -o -name '*.apk' \)); do
            name=$(basename "$f")
            size=$(stat -c%s "$f")
            rel=${f#artifacts/}
            platform="unknown"
            [[ "$name" == *".msix"* ]] && platform="windows"
            [[ "$name" == *".apk"* ]] && platform="android"
            [[ "$name" == *".tar.gz"* ]] && platform="linux"
            entry="{\"name\":\"$name\",\"platform\":\"$platform\",\"size\":$size,\"url\":\"$BASE/$rel\"}"
            if [ -z "$assets_json" ]; then assets_json="$entry"; else assets_json="$assets_json,$entry"; fi
          done
          echo "{\"version\":\"v$VERSION\",\"published_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"html_url\":\"https://keenx.net/#apps\",\"assets\":[$assets_json]}" > latest.json

      - name: Upload latest.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws s3 cp latest.json s3://${R2_BUCKET_NAME}/latest.json --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com --region auto --content-type application/json --cache-control "public, max-age=60"

  update-supabase:
    name: Update Supabase
    needs: upload-r2
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: PATCH
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -s -X PATCH "${SUPABASE_URL}/rest/v1/remote_config?id=eq.1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"latest_version\":\"$VERSION\"}"
