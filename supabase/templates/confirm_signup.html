<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد حسابك - Dark Downloader</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #161b22;
      border-radius: 16px;
      border: 1px solid #30363d;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .header {
      background: linear-gradient(135deg, #2ea043 0%, #238636 100%);
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }
    .content {
      padding: 40px 30px;
      text-align: center;
    }
    .content h2 {
      color: #ffffff;
      font-size: 22px;
      margin-top: 0;
    }
    .content p {
      color: #8b949e;
      font-size: 16px;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      background-color: #2ea043;
      color: #ffffff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #3fb950;
    }
    .footer {
      background: #0d1117;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #484f58;
      border-top: 1px solid #30363d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dark Downloader</h1>
    </div>
    <div class="content">
      <h2>مرحباً بك في عالم التحميل السريع! 🚀</h2>
      <p>شكراً لانضمامك إلى مجتمع Dark Downloader. لتفعيل حسابك والبدء بالتحميل فوراً، يرجى الضغط على الزر أدناه:</p>
      <a href="{{ .ConfirmationURL }}" class="btn">تأكيد حسابي الآن</a>
    </div>
    <div class="footer">
      &copy; 2026 Dark Downloader. جميع الحقوق محفوظة.<br>
      إذا لم تقم بإنشاء هذا الحساب، يرجى تجاهل هذه الرسالة.
    </div>
  </div>
</body>
</html>
