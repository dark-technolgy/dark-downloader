<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد حسابك - Dark Downloader</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #0a0a0a;
      border-radius: 24px;
      border: 1px solid #333333;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,163,255,0.1);
    }
    .header {
      background: linear-gradient(135deg, #00A3FF 0%, #0066FF 100%);
      padding: 40px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .content {
      padding: 50px 40px;
      text-align: center;
    }
    .content h2 {
      color: #ffffff;
      font-size: 24px;
      margin-top: 0;
      font-weight: 600;
    }
    .content p {
      color: #aaaaaa;
      font-size: 16px;
      margin-bottom: 40px;
    }
    .otp-box {
      background: #111111;
      padding: 20px;
      border-radius: 16px;
      border: 2px dashed #00A3FF;
      display: inline-block;
      margin-bottom: 40px;
    }
    .otp-code {
      font-size: 42px;
      font-weight: bold;
      color: #00A3FF;
      letter-spacing: 10px;
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
    }
    .footer {
      background: #050505;
      padding: 30px;
      text-align: center;
      font-size: 13px;
      color: #555555;
      border-top: 1px solid #222222;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dark Downloader</h1>
    </div>
    <div class="content">
      <h2>أهلاً بك في دارك! 🚀</h2>
      <p>شكراً لانضمامك إلينا. رمز التحقق الخاص بك لتفعيل الحساب هو:</p>

      <div class="otp-box">
        <h1 class="otp-code">{{ .Token }}</h1>
      </div>

      <p>الرجاء إدخال هذا الرمز في التطبيق لإكمال عملية التسجيل.</p>
    </div>
    <div class="footer">
      &copy; 2026 Dark Downloader. جميع الحقوق محفوظة.<br>
      إذا لم تطلب هذا الرمز، يمكنك تجاهل هذه الرسالة بأمان.
    </div>
  </div>
</body>
</html>
